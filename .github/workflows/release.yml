name: Release

on:
  push:
    tags:
      - "v*.*.*"
  # Dry run: builds every artifact (downloadable from the run page) without
  # publishing a release.
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            kind: linux
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            kind: linux-musl
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            kind: linux-arm
          - target: aarch64-apple-darwin
            os: macos-latest
            kind: macos
          # macOS Intel runner. Swap to `macos-13` if `macos-15-intel` is
          # unavailable to your account.
          - target: x86_64-apple-darwin
            os: macos-15-intel
            kind: macos
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            kind: windows
            arch: x86_64
          - target: i686-pc-windows-msvc
            os: windows-latest
            kind: windows
            arch: i686
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            kind: windows
            arch: arm64
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # x86_64 musl builds natively on the GNU runner with musl-tools (no `cross`).
      - name: Install musl tools
        if: matrix.kind == 'linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # aarch64 Linux cross-compiles with the GNU cross toolchain + linker.
      - name: Install aarch64 cross linker
        if: matrix.kind == 'linux-arm'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      # Linux & macOS use the aggressive release profile from Cargo.toml
      # (opt-level "z", fat LTO, strip = true; rustc's `-C strip` works for the
      # cross target too, so no separate cross-strip is needed). The aarch64
      # linker env is ignored by the other (native) targets.
      - name: Build (Linux/macOS)
        if: matrix.kind != 'windows'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} -p confy-tui

      # Windows overrides the profile via env to avoid antivirus false positives
      # (no strip, thin LTO, unwind panics, static CRT).
      - name: Build (Windows)
        if: matrix.kind == 'windows'
        shell: bash
        env:
          CARGO_PROFILE_RELEASE_OPT_LEVEL: "3"
          CARGO_PROFILE_RELEASE_LTO: "thin"
          CARGO_PROFILE_RELEASE_STRIP: "false"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
          CARGO_PROFILE_RELEASE_PANIC: "unwind"
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo build --release --target ${{ matrix.target }} -p confy-tui

      # Linux/macOS: tar.gz with the bare `confy` binary at the root.
      - name: Package (Linux/macOS)
        if: matrix.kind != 'windows'
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/confy"
          tar -C "$(dirname "$bin")" -czf "confy-${{ matrix.target }}.tar.gz" confy

      # Windows: ship the bare .exe (no archive).
      - name: Package (Windows)
        if: matrix.kind == 'windows'
        shell: bash
        run: cp "target/${{ matrix.target }}/release/confy.exe" "confy-windows-${{ matrix.arch }}.exe"

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.target }}
          path: |
            confy-*.tar.gz
            confy-windows-*.exe
          if-no-files-found: ignore

  # Desktop app (Tauri shell over the web UI). Separate job from the TUI build:
  # it needs the wasm/web frontend toolchain, and macOS additionally tauri-cli
  # for .dmg bundling. Windows ships a portable exe (the frontend is embedded
  # at compile time, so the bare binary is self-contained) plus an unsigned
  # .msix for Microsoft Store submission (see crates/confy-tauri/msix/STORE.md).
  desktop:
    name: Desktop ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            kind: macos
            arch: aarch64
          - target: x86_64-apple-darwin
            os: macos-15-intel
            kind: macos
            arch: x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            kind: windows
            arch: x86_64
    steps:
      - uses: actions/checkout@v5

      # wasm32 for the confy-ffi frontend core built by web/cf-build.sh.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }},wasm32-unknown-unknown

      # Prebuilt binaries in seconds (cargo install would take ~10 min).
      - uses: cargo-bins/cargo-binstall@main

      - name: Install wasm-pack
        run: cargo binstall -y wasm-pack

      - name: Install tauri-cli
        if: matrix.kind == 'macos'
        run: cargo binstall -y tauri-cli

      # macOS: tauri-cli runs beforeBuildCommand (web/cf-build.sh) and bundles
      # the .app into a .dmg (bundle.targets in tauri.conf.json).
      - name: Build .dmg (macOS)
        if: matrix.kind == 'macos'
        working-directory: crates/confy-tauri
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Package (macOS)
        if: matrix.kind == 'macos'
        run: cp target/${{ matrix.target }}/release/bundle/dmg/*.dmg "confy-desktop-macos-${{ matrix.arch }}.dmg"

      # Windows: no bundler needed — build the web frontend, then the bare exe
      # (assets are compile-time embedded → portable single file). Same
      # AV-friendly profile overrides as the TUI build.
      - name: Build web frontend (Windows)
        if: matrix.kind == 'windows'
        shell: bash
        run: bash web/cf-build.sh

      - name: Build portable exe (Windows)
        if: matrix.kind == 'windows'
        shell: bash
        env:
          CARGO_PROFILE_RELEASE_OPT_LEVEL: "3"
          CARGO_PROFILE_RELEASE_LTO: "thin"
          CARGO_PROFILE_RELEASE_STRIP: "false"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
          CARGO_PROFILE_RELEASE_PANIC: "unwind"
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: |
          cargo build --release --target ${{ matrix.target }} -p confy-tauri
          cp "target/${{ matrix.target }}/release/confy-desktop.exe" "confy-desktop-windows-${{ matrix.arch }}.exe"

      # Unsigned .msix for Store submission; identity comes from repo variables
      # once the Partner Center registration exists (placeholders until then).
      - name: Pack .msix (Windows)
        if: matrix.kind == 'windows'
        shell: pwsh
        env:
          MSIX_IDENTITY_NAME: ${{ vars.MSIX_IDENTITY_NAME }}
          MSIX_PUBLISHER: ${{ vars.MSIX_PUBLISHER }}
          MSIX_PUBLISHER_DISPLAY: ${{ vars.MSIX_PUBLISHER_DISPLAY }}
        run: |
          $ref = "${{ github.ref_name }}"
          $ver = if ($ref -match '^v(\d+)\.(\d+)\.(\d+)') { "$($Matches[1]).$($Matches[2]).$($Matches[3]).0" } else { "0.0.0.0" }
          crates/confy-tauri/msix/pack-msix.ps1 `
            -Exe "confy-desktop-windows-${{ matrix.arch }}.exe" `
            -Version $ver `
            -Out "confy-desktop-windows-${{ matrix.arch }}.msix"

      - uses: actions/upload-artifact@v5
        with:
          name: desktop-${{ matrix.target }}
          path: |
            confy-desktop-*.dmg
            confy-desktop-*.exe
            confy-desktop-*.msix
          if-no-files-found: error

  release:
    name: Publish release
    # Dry runs (workflow_dispatch) stop after building; only tags publish.
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, desktop]
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 so the annotated tag message is available for the preamble.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: |
          sha256sum confy-* > SHA256SUMS
          cat SHA256SUMS

      - name: Annotated tag message → release preamble
        run: git tag -l --format='%(contents)' "${GITHUB_REF_NAME}" > TAG_BODY.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: TAG_BODY.md
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            artifacts/confy-*.tar.gz
            artifacts/confy-windows-*.exe
            artifacts/confy-desktop-*
            artifacts/SHA256SUMS
