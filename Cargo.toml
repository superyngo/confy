[package]
name = "confy"
version = "0.1.0"
edition = "2021"
authors = ["wen"]
description = "A TUI editor for structured config files (TOML first; YAML/JSON planned)"
license = "MIT"
repository = "https://github.com/superyngo/confy"

# NOTE: dependency set is provisional — finalized during planning.
[dependencies]
clap = { version = "4", features = ["derive"] }
anyhow = "1"

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
